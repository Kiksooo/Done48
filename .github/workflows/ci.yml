name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      NEXTAUTH_SECRET: ci-secret-ci-secret-ci-secret-ci-secret-00
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npx prisma db push
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

      - run: npm run build

      - run: npm run test

      - run: npm run db:seed

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          CI: "true"

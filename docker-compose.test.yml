# Локальная PostgreSQL только для интеграционных тестов (порт 5433 — не мешает dev на 5432).
# Запуск: npm run test:db:up
# Схема:  npm run test:db:migrate
# Прогон:  npm test
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: done48
      POSTGRES_PASSWORD: done48
      POSTGRES_DB: done48_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U done48 -d done48_test"]
      interval: 2s
      timeout: 5s
      retries: 15
